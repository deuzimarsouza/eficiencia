<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Eficiência de Linha - Resumo</title>

<style>
@font-face{
    font-family: "LufgaRegular";
    src: url("../src/fonts/LufgaRegular.ttf");
}

* {
    font-family: "LufgaRegular", sans-serif;
    box-sizing: border-box;
    padding: 0;
    margin: 0;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    scrollbar-width: none;
    outline: none;
}

body {
    background-color: #000000;
    color: #F9FAFB;
    width: 100%;
    max-width: 480px; 
    padding: 24px 24px 100px 24px;
    min-height: 100vh;
    position: relative;
    margin: 0 auto;
}

select {
    appearance: none;
    text-indent: 4px;
    background-color: transparent;
    cursor: pointer;
}

select option {
    background-color: #111111;
    color: #FFFFFF;
}

select option:disabled {
    color: #4B5563; /* Cor mais escura para opções desabilitadas */
    font-style: italic;
}

button {
    outline: none;
    cursor: pointer;
    border-radius: 14px;
    transition: all 0.2s ease;
    font-weight: 700;
}

button:active { transform: scale(0.96); }

/* =========================================
   DESIGN: TABELAS (CARDS) COM GLASSMORPHISM
   ========================================= */

.container-tabela {
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    margin-bottom: 24px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    display: flex;
    flex-direction: column;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}

.titulo-linha {
    width: 100%;
    padding: 16px;
    background: rgba(92, 154, 255, 0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #5C9AFF; 
    border-bottom: 1px solid rgba(92, 154, 255, 0.2);
    font-weight: 800;
    font-size: 16px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1px;
}

table {
    width: 100%;
    background: transparent;
    border-collapse: collapse;
}

th {
    background: rgba(255, 255, 255, 0.05);
    color: #9CA3AF;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    padding: 12px 4px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
    letter-spacing: 0.5px;
}

td { 
    background: transparent; 
    padding: 10px 6px;
    vertical-align: middle;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    text-align: center;
}

tr:last-child td { border-bottom: none; }

td.resumo { border-left: 1px dashed rgba(255, 255, 255, 0.1); }

td.resumo.necessidade, td.resumo.eficiencia, .texto-destaque {
    color: #5C9AFF; 
    font-size: 15px;
    font-weight: 800;
    text-align: center;
}

.input-tabela {
    width: 100%;
    height: 42px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.05); 
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 10px;
    color: #F9FAFB;
    transition: all 0.2s ease;
}

.linha-select {
    text-align: left;
    padding-left: 8px;
    color: #E5E7EB;
    font-weight: 700;
}

.input-tabela:focus, .input-tabela:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: #5C9AFF;
    box-shadow: 0 0 0 3px rgba(92, 154, 255, 0.2);
}

.total-linha {
    width: 100%;
    padding: 16px;
    background: rgba(255, 255, 255, 0.02);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    justify-content: space-around;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
}

.badge-total {
    font-size: 12px;
    color: #9CA3AF;
    font-weight: 700;
    text-transform: uppercase;
}

.badge-total b { font-size: 16px; color: #F9FAFB; font-weight: 800; margin-left: 4px; }
.badge-total.difer b { color: #F87171; }
.badge-total.positivo b { color: #34D399; }
.badge-total.perc-badge b { color: #5C9AFF; }

.text-red { color: #F87171 !important; font-weight: 800; }
.text-green { color: #34D399 !important; font-weight: 800; }

/* =========================================
   BOTOES INFERIORES (FIXOS NO BOTTOM)
   ========================================= */

.botoes-acao {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    gap: 8px;
    padding: 12px 16px 20px 16px;
    z-index: 100;
}

.botoes-acao button {
    flex: 1;
    height: 56px;
    font-size: 11px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    border-radius: 12px;
    padding: 4px;
    line-height: 1;
    text-transform: uppercase;
}

.btn-icon {
    font-size: 18px;
}

.btn-outline-red {
    background: rgba(248, 113, 113, 0.1);
    color: #F87171;
    border: 1px solid rgba(248, 113, 113, 0.3);
}

.btn-outline-red:hover {
    background: rgba(248, 113, 113, 0.2);
}

.btn-purple {
    background: #5C9AFF; 
    color: #ffffff;
    border: none;
    box-shadow: 0 4px 12px rgba(92, 154, 255, 0.25);
}

.btn-purple:hover {
    background: #4A83E5;
    box-shadow: 0 6px 16px rgba(92, 154, 255, 0.4);
}

.btn-green {
    background: #10B981;
    color: #ffffff;
    border: none;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
}

.btn-green:hover {
    background: #059669;
    box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
}

.btn-limpar {
    background: rgba(248, 113, 113, 0.05);
    color: #F87171;
    border: 1px dashed rgba(248, 113, 113, 0.3);
}

.btn-limpar:hover, .btn-limpar:active {
    background: rgba(248, 113, 113, 0.1);
    border-style: solid;
}

/* =========================================
   MODAL PERSONALIZADO (GLASSMORPHISM)
   ========================================= */

.modal-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 9999;
    display: none; 
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.2s ease;
    padding: 24px;
}

.modal-overlay.ativo {
    opacity: 1;
}

.modal-box {
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 320px;
    text-align: center;
    transform: translateY(20px) scale(0.95);
    transition: transform 0.2s ease;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
}

.modal-overlay.ativo .modal-box {
    transform: translateY(0) scale(1);
}

.modal-icone {
    font-size: 48px;
    margin-bottom: 16px;
}

.modal-mensagem {
    font-size: 16px;
    font-weight: 700;
    color: #F9FAFB;
    margin-bottom: 28px;
    line-height: 1.5;
}

.modal-botoes {
    display: flex;
    gap: 12px;
}

.modal-botoes button {
    flex: 1;
    height: 48px;
    border-radius: 12px;
}

</style>
</head>

<body>

<div id="tabela-resumo-wrapper">
    <div class="container-tabela">
        <div class="titulo-linha">RESUMO DA PRODUÇÃO</div>
        <table>
            <thead>
                <tr>
                    <th style="width:30%">Linha</th>
                    <th style="width:18%">Proj.</th>
                    <th style="width:18%">Real</th>
                    <th style="width:17%">Dif.</th>
                    <th style="width:17%">%</th>
                </tr>
            </thead>
            <tbody id="tbody-resumo">
                </tbody>
        </table>
        <div class="total-linha">
            <span class="badge-total">PROJ.: <b id="total-proj">0</b></span>
            <span class="badge-total">REAL: <b id="total-real">0</b></span>
            <span class="badge-total difer">DIF.: <b id="total-dif">0</b></span>
            <span class="badge-total perc-badge">%: <b id="total-perc">0%</b></span>
        </div>
    </div>
</div>

<div class="botoes-acao">
    <button class="btn-outline-red" onclick="removerUltimaLinhaResumo()">
        <span class="btn-icon">&#10005;</span>
        Remover
    </button>
    <button class="btn-purple" onclick="adicionarLinhaResumo()">
        <span class="btn-icon">&#10010;</span>
        Adicionar
    </button>
    <button class="btn-green" onclick="salvarDados()">
        <span class="btn-icon">&#128190;</span>
        Salvar
    </button>
    <button class="btn-limpar" onclick="limparDados()">
        <span class="btn-icon">🗑️</span>
        Limpar
    </button>
</div>

<div id="modal-overlay" class="modal-overlay">
    <div class="modal-box">
        <div id="modal-icone" class="modal-icone"></div>
        <div id="modal-mensagem" class="modal-mensagem"></div>
        <div id="modal-botoes" class="modal-botoes"></div>
    </div>
</div>

<script>
let dadosResumo = [
    { linha: "Linha 01", proj: "", real: "" },
    { linha: "Linha 02", proj: "", real: "" },
    { linha: "Linha 03", proj: "", real: "" }
];

/* =========================================
   FUNÇÕES DO MODAL
   ========================================= */
function fecharModal() {
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.remove('ativo');
    setTimeout(() => { overlay.style.display = 'none'; }, 200);
}

function mostrarAlerta(icone, mensagem) {
    const overlay = document.getElementById('modal-overlay');
    document.getElementById('modal-icone').innerHTML = icone;
    document.getElementById('modal-mensagem').innerHTML = mensagem;
    
    document.getElementById('modal-botoes').innerHTML = `
        <button class="btn-purple" onclick="fecharModal()" style="width: 100%">OK</button>
    `;
    
    overlay.style.display = 'flex';
    setTimeout(() => overlay.classList.add('ativo'), 10);
}

function mostrarConfirmacao(icone, mensagem, onConfirm) {
    const overlay = document.getElementById('modal-overlay');
    document.getElementById('modal-icone').innerHTML = icone;
    document.getElementById('modal-mensagem').innerHTML = mensagem;
    
    window.acaoConfirmada = () => {
        fecharModal();
        onConfirm();
    };

    document.getElementById('modal-botoes').innerHTML = `
        <button class="btn-outline-red" onclick="fecharModal()">Cancelar</button>
        <button class="btn-green" onclick="window.acaoConfirmada()">Sim, Limpar</button>
    `;
    
    overlay.style.display = 'flex';
    setTimeout(() => overlay.classList.add('ativo'), 10);
}

/* =========================================
   CÓDIGO DA APLICAÇÃO
   ========================================= */

function criarSelectLinhas(valorAtual) {
    const linhasEmUso = dadosResumo.map(item => item.linha);
    let html = `<select class="input-tabela linha-select">`;
    for (let i = 1; i <= 20; i++) {
        let numFormatado = i < 10 ? `0${i}` : i;
        let nomeLinha = `Linha ${numFormatado}`;
        let selecionado = nomeLinha === valorAtual ? "selected" : "";
        
        // Desabilita opções que já estão sendo usadas (exceto a da própria linha)
        let desabilitado = (linhasEmUso.includes(nomeLinha) && nomeLinha !== valorAtual) ? "disabled" : "";
        
        html += `<option value="${nomeLinha}" ${selecionado} ${desabilitado}>${nomeLinha}</option>`;
    }
    html += `</select>`;
    return html;
}

function renderizarTabelaResumo() {
    const tbody = document.getElementById('tbody-resumo');
    tbody.innerHTML = '';

    dadosResumo.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.className = 'linha-item';
        tr.innerHTML = `
            <td>${criarSelectLinhas(item.linha)}</td>
            <td><input type="number" class="input-tabela proj-input" data-index="${index}" value="${item.proj}"></td>
            <td><input type="number" class="input-tabela real-input" data-index="${index}" value="${item.real}"></td>
            <td class="resumo texto-destaque dif-cell">-</td>
            <td class="resumo texto-destaque perc-cell">-</td>
        `;
        tbody.appendChild(tr);
    });

    // Adiciona os eventos para calcular na hora e reordenar ao mudar a linha
    const linhasRenderizadas = document.querySelectorAll('.linha-item');
    linhasRenderizadas.forEach((tr, index) => {
        const select = tr.querySelector('.linha-select');
        select.addEventListener('change', (e) => alterarLinha(e, index));

        const inputs = tr.querySelectorAll('.proj-input, .real-input');
        inputs.forEach(input => input.addEventListener('input', calcularResumo));
    });

    calcularResumo();
}

function alterarLinha(event, index) {
    // Atualiza a linha selecionada
    dadosResumo[index].linha = event.target.value;
    
    // Reordena o array para manter ordem crescente
    dadosResumo.sort((a, b) => a.linha.localeCompare(b.linha));
    
    // Renderiza novamente a tabela
    renderizarTabelaResumo();
}

function calcularResumo() {
    const linhas = document.querySelectorAll('.linha-item');
    let totalProj = 0, totalReal = 0;

    linhas.forEach((tr, index) => {
        const projInput = tr.querySelector('.proj-input').value;
        const realInput = tr.querySelector('.real-input').value;
        
        const proj = parseFloat(projInput) || 0;
        const real = parseFloat(realInput) || 0;
        
        // Atualiza os dados apenas do proj/real (não atualiza o select para não piscar a tela)
        dadosResumo[index].proj = projInput;
        dadosResumo[index].real = realInput;

        totalProj += proj;
        totalReal += real;

        const dif = real - proj;
        const perc = proj > 0 ? Math.round((real / proj) * 100) : (real === 0 && proj === 0 ? 0 : 100);

        const difCell = tr.querySelector('.dif-cell');
        const percCell = tr.querySelector('.perc-cell');

        if (projInput === "" && realInput === "") {
            difCell.innerText = "-";
            difCell.className = "resumo texto-destaque dif-cell";
            percCell.innerText = "-";
        } else {
            difCell.innerText = dif > 0 ? `+${dif}` : dif;
            difCell.className = `resumo texto-destaque dif-cell ${dif > 0 ? 'text-green' : (dif < 0 ? 'text-red' : '')}`;
            percCell.innerText = `${perc}%`;
        }
    });

    const totalDif = totalReal - totalProj;
    const totalPerc = totalProj > 0 ? Math.round((totalReal / totalProj) * 100) : 0;

    document.getElementById('total-proj').innerText = totalProj;
    document.getElementById('total-real').innerText = totalReal;
    
    const elDif = document.getElementById('total-dif');
    elDif.innerText = totalDif > 0 ? `+${totalDif}` : totalDif;
    elDif.parentElement.className = `badge-total difer ${totalDif > 0 ? 'positivo' : ''}`;
    
    document.getElementById('total-perc').innerText = `${totalPerc}%`;
}

function adicionarLinhaResumo() {
    // Validação de limite máximo de 20
    if (dadosResumo.length >= 20) {
        mostrarAlerta("⚠️", "Limite máximo de 20 linhas atingido.");
        return;
    }

    // Acha a primeira linha disponível que não está na lista
    let novaLinhaNum = 1;
    const linhasUsadas = dadosResumo.map(item => item.linha);
    for (let i = 1; i <= 20; i++) {
        let numFormatado = i < 10 ? `0${i}` : i;
        let nomeTeste = `Linha ${numFormatado}`;
        if (!linhasUsadas.includes(nomeTeste)) {
            novaLinhaNum = i;
            break;
        }
    }

    let numFormatado = novaLinhaNum < 10 ? `0${novaLinhaNum}` : novaLinhaNum;
    let linhaNome = `Linha ${numFormatado}`;
    
    dadosResumo.push({ linha: linhaNome, proj: "", real: "" });
    
    // Ordena as linhas para manter a ordem crescente
    dadosResumo.sort((a, b) => a.linha.localeCompare(b.linha));
    
    renderizarTabelaResumo();
}

function removerUltimaLinhaResumo() {
    if (dadosResumo.length > 0) {
        // Pelo fato de estar sempre ordenado, isso remove a linha de numeração mais alta inserida
        dadosResumo.pop();
        renderizarTabelaResumo();
    }
}

function limparDados() {
    mostrarConfirmacao("🗑️", "Tem certeza que deseja limpar TODOS os dados inseridos?", () => {
        
        // Ao invés de deletar tudo, ele limpa e reinicia sequencialmente mantendo a quantidade atual ou voltando ao padrão
        dadosResumo.forEach((item, index) => {
            let num = index + 1;
            item.linha = `Linha ${num < 10 ? '0' + num : num}`;
            item.proj = "";
            item.real = "";
        });
        
        // Garante a ordenação novamente
        dadosResumo.sort((a, b) => a.linha.localeCompare(b.linha));
        renderizarTabelaResumo();
        
        localStorage.removeItem('relatorio_eficiencia');
        
        setTimeout(() => {
            mostrarAlerta("✨", "Dados limpos com sucesso!");
        }, 300); 
        
    });
}

function salvarDados() {
    const data = {
        resumo: dadosResumo
    };
    
    localStorage.setItem('relatorio_eficiencia', JSON.stringify(data));
    
    mostrarAlerta('💾', 'Dados salvos com sucesso no dispositivo!');
}

function carregarDados() {
    const saved = localStorage.getItem('relatorio_eficiencia');
    if (saved) {
        try {
            const data = JSON.parse(saved);
            
            if (data.resumo && data.resumo.length > 0) {
                dadosResumo = data.resumo;
                // Ao carregar, ordena para garantir que os dados antigos entrem organizados
                dadosResumo.sort((a, b) => a.linha.localeCompare(b.linha));
            }
        } catch (e) {
            console.error("Erro ao carregar dados salvos.", e);
        }
    }
    
    renderizarTabelaResumo();
}

// Inicializações
carregarDados();
</script>

</body>
</html>
