<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Eficiência de Linha</title>

<style>
* {
    font-family: Arial, Helvetica, sans-serif;
    box-sizing: border-box;
    padding: 0;
    margin: 0;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    scrollbar-width: none;
    outline: none;
}

body {
    background-color: #ffffff;
    padding: 12px;
}

button {
    width: 54px;
    height: 54px;
    outline: none;
    border: 2px solid #000000;
    cursor: pointer;
    border-radius: 12px;
    transition: transform 0.1s;
    font-weight: 600;
    box-shadow: none;
}

button:active { transform: scale(0.9); cursor: pointer; outline: none;}

/* --- ESTILO DAS TABELAS --- */
.container-tabela {
    margin-bottom: 25px;
}

.titulo-linha {
    width: 100%;
    padding: 8px 14px;
    background: #ffffff;
    border: 2px solid rgba(0, 0, 255, 0.2);
    border-radius: 12px 12px 0px 0px;
    font-weight: bold;
    color: #0031CA;
    text-transform: uppercase;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
}

/* --- NOVO ESTILO DO RODAPÉ DA TABELA (TOTAL) --- */
.total-linha {
    width: 100%;
    padding: 10px 14px;
    background: #f0f4ff;
    border-left: 2px solid rgba(0, 0, 255, 0.2);
    border-right: 2px solid rgba(0, 0, 255, 0.2);
    border-bottom: 2px solid rgba(0, 0, 255, 0.2);
    border-radius: 0px 0px 12px 12px;
    color: #0031CA;
    font-weight: 800;
    text-align: center;
    font-size: 16px;
    text-transform: uppercase;
}

table {
    width: 100%;
    padding: 8px;
    border-left: 2px solid rgba(0, 0, 255, 0.2);
    border-right: 2px solid rgba(0, 0, 255, 0.2);
    /* Borda inferior e radius removidos para conectar com o total */
    border-bottom: 0px; 
    border-radius: 0px;
    background: #ffffff;
    overflow: hidden;
}

td { background: #ffffff; border: 0px; color: #0031CA; font-weight: 600; text-align: center; padding: 4px;}

th {
    border: 4px solid #ffffff;
    height: 42px;
    text-align: center;
    background: #0031CA;
    color: #ffffff;
    border-radius: 8px;
}

.resumogeral {
    border-top: 2px solid rgba(0, 0, 255, 0.2);
    border-bottom: 2px solid rgba(0, 0, 255, 0.2); /* Adicionado borda embaixo */
    border-radius: 12px;
}

.ativos, .pares {
    width: 100%;
    height: 36px;
    text-align: center;
    font-size: 12pt;
    font-weight: 600;
    background-color: #ffffff;
    border: none;
}

.modelo {
    width: 100%;
    height: 36px;
    background: #ffffff;
    font-size: 12pt;
    font-weight: 600;
    border: 0;
}

#menu {
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-radius: 12px;
    width: calc(100% - 24px);
    height: 72px;
    padding: 0px 8px;
    position: fixed;
    backdrop-filter: blur(3px);
    margin-bottom: 12px;
    bottom: 0;
    border: 2px solid rgba(0, 0, 255, 0.2);
    background-color: rgba(255, 255, 255, 0.3)
}

.btn-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
}

.create, .salvar, .delete, .calcresultado, .homepage {
    font-size: 0;
    border: 2px solid blue;
    cursor: pointer;
    outline: none;
}

.create { background: url(icons/camada-mais.png) center center/32px no-repeat; }
.salvar { background: url(icons/disco.png) center center/32px no-repeat; }
.delete { background: url(icons/limpar.png) center center/34px no-repeat; }
.calcresultado { background: url(icons/painel.png) center center/36px no-repeat; }
.homepage { background: url(icons/casa.png) center center/34px no-repeat; }

/* --- TOAST NOTIFICATION --- */
.toast {
    position: fixed;
    top: -60px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 28px;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    z-index: 10000;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.toast.show { top: 12px; }
.toast-success { background: #2ecc71; color:#ffffff; border: 2px solid #90ffbe; letter-spacing: 1px;}
.toast-error { background: #e74c3c;  color: #ffffff; border: 2px solid #ff9f95; letter-spacing: 1px;}
.toast-info { background: #544bd6; color: #ffffff; border: 2px solid #aca8ff; letter-spacing: 1px; }

/* --- MODAIS --- */
.modal-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    backdrop-filter: blur(2px);
}

.modal {
    background: white;
    padding: 25px;
    border-radius: 24px;
    width: 320px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    animation: modalEntrada 0.3s ease-out;
}

@keyframes modalEntrada {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.modal h3 { color: #333; margin-bottom: 10px; }
.modal p { color: #666; font-size: 14px; margin-bottom: 20px; }

.modal input {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 2px solid #cecbff;
    border-radius: 12px;
    outline: none;
    text-align: center;
    font-weight: bold;
    font-size: 16px;
}

.modal-btns { display: flex; gap: 10px; }

.modal-btns button {
    flex: 1;
    height: 48px;
    font-weight: bold;
    border: none;
}

.btn-confirm { background: #544bd6; color: white; }
.btn-delete { background: #e74c3c; color: white; }
.btn-cancel { background: #f0f0f0; color: #666; }

#space-data {
    width: 100%;
    height: 96px;
    background-color: #ffffff;
}
</style>
</head>

<body>

<div id="modalCriar" class="modal-overlay">
    <div class="modal">
        <h3>Nova Linha</h3>
        <p>Digite o nome da linha de produção</p>
        <input type="text" id="inputNomeTabela" placeholder="Ex: LINHA 01">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="fecharModal('modalCriar')">Cancelar</button>
            <button class="btn-confirm" onclick="confirmarCriacao()">Criar</button>
        </div>
    </div>
</div>

<div id="modalRemover" class="modal-overlay">
    <div class="modal">
        <h3 style="color: #e74c3c;">REMOVER A LINHA?</h3>
        <p>Esta ação apagará a última tabela criada. Deseja continuar?</p>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="fecharModal('modalRemover')">CANCELAR</button>
            <button class="btn-delete" onclick="confirmarRemocao()">APAGAR</button>
        </div>
    </div>
</div>

<div id="menu">
    <div class="btn-options">
        <button class="create" onclick="abrirModal('modalCriar')">ADICIONAR</button>
        <button class="salvar" onclick="salvarDados()">SALVAR</button>
        <button class="delete" onclick="abrirModalRemover()">REMOVER</button>
        <button class="calcresultado" onclick="goTo('resultado.html')">RESULTADO</button>
        <button class="homepage" onclick="goTo('index.html')">HOME</button>
    </div>
</div>

<div id="tabelas"></div>
<div id="resumoGeral"></div>

<div id="space-data"></div>

<script>
const MAX_TABELAS = 5;
const STORAGE_KEY = "eficiencia_linhas";

const MODELOS_DB = [
  { nome:"130G", tempo: 4.477 }, { nome: "ACQUA", tempo: 4.185 }, { nome: "ACQUA INF.", tempo: 4.184 }, { nome: "ADRENA", tempo: 5.657 }, { nome: "ADRENA 2", tempo: 5.449 },
  { nome: "ASFALTO", tempo: 6.056 }, { nome: "ATMOS", tempo: 5.056 }, { nome: "CHALLENGER 6", tempo: 8.183 }, { nome: "CIRCUITO", tempo: 7.241 }, { nome: "CITRUS 2", tempo: 4.792 },
  { nome: "CLIC", tempo: 2.290 }, { nome: "CLIMA", tempo: 4.511 }, { nome: "CORRE 4", tempo: 20.933 }, { nome: "CORRE 4 50 ANOS", tempo: 21.872 }, { nome: "CORRE 5", tempo: 13.963 },
  { nome: "CORRE GRAFENO 3", tempo: 17.811 }, { nome: "CORRE MAX", tempo: 10.342 }, { nome: "CORRE S", tempo: 10.932 }, { nome: "CORRE SUPRA 2", tempo: 20.996 }, { nome: "CORRE TRILHA 3", tempo: 11.356 },
  { nome: "CORRE TURBO", tempo: 13.136 }, { nome: "CORRE VENTO 3", tempo: 9.282 }, { nome: "EASY 2", tempo: 5.304 }, { nome: "ERA", tempo: 3.931 }, { nome: "ESSENTIAL 3", tempo: 4.608 },
  { nome: "INVERSE", tempo: 8.044 }, { nome: "LANCE", tempo: 5.066 }, { nome: "NEBLINA", tempo: 8.954 }, { nome: "NYX", tempo: 4.901 }, { nome: "ORBITA", tempo: 4.540 },
  { nome: "PIXEL INF.", tempo: 3.655 }, { nome: "PLAZA", tempo: 4.186 }, { nome: "PRIDE 4", tempo: 4.906 }, { nome: "PRIDE 4 INF.", tempo: 4.914 }, { nome: "PURPURA", tempo: 5.555 },
  { nome: "QU4DRA 2", tempo: 9.317 }, { nome: "QU4DRA BR1", tempo: 13.324 }, { nome: "REFLECT", tempo: 6.354 }, { nome: "REVERSO 2", tempo: 8.748 }, { nome: "REVERSO 3", tempo: 10.328 },
  { nome: "RITMO", tempo: 7.959 }, { nome: "RUSH", tempo: 3.837 }, { nome: "SAGAZ", tempo: 5.582 }, { nome: "SONORO 3", tempo: 8.488 }, { nome: "SUBVERSE", tempo: 7.938 },
  { nome: "SUBVERSE 2", tempo: 7.906 }, { nome: "SWIFT 5", tempo: 4.516 }, { nome: "TREINO", tempo: 7.525 }, { nome: "TRIUNFO", tempo: 4.553 }, { nome: "VEST", tempo: 4.292 },
  { nome: "VIRTUOSE", tempo: 5.308 }, { nome: "VOA 2", tempo: 4.908 }, { nome: "VOA 3", tempo: 4.988 }, { nome: "VOLCAN 2", tempo: 4.531 }, { nome: "VOLTA", tempo: 7.641 },

  { nome: "-", tempo: 0 },

  { nome: "ACTION 4", tempo: 8.756 }, { nome: "ATLANTIS 2", tempo: 7.618 }, { nome: "BASE ONE", tempo: 15.676 }, { nome: "BASE PRIME", tempo: 12.318 }, { nome: "BASE RIDE", tempo: 9.917 }, { nome: "CDS SPORT", tempo: 13.612 },
  { nome: "COOL RIDE 3", tempo: 12.167 }, { nome: "COOL RIDE 3 INF.", tempo: 12.166 }, { nome: "CREATION", tempo: 12.373 }, { nome: "DYNASTY 5", tempo: 9.037 }, { nome: "DYNASTY 7", tempo: 11.924 }, { nome: "DYNASTY 8", tempo: 6.391 },
  { nome: "EDO CROSS", tempo: 10.384 }, { nome: "ENDEAVOR 3", tempo: 7.656 }, { nome: "ENIGMA 2", tempo: 8.128 }, { nome: "ENIGMA 3", tempo: 7.148 }, { nome: "FALCON 5", tempo: 8.058 },
  { nome: "FRONTIER 15", tempo: 8.281 }, { nome: "GLOW 2", tempo: 7.722 }, { nome: "GLOW 3", tempo: 6.516 }, { nome: "GOYA", tempo: 5.672 }, { nome: "GOYA 2", tempo: 5.703 }, { nome: "GOYA 3", tempo: 6.243 },
  { nome: "HAWK 5", tempo: 6.253 }, { nome: "HAWK 6", tempo: 9.255 }, { nome: "INVICTUS 4", tempo: 8.601 }, { nome: "LEGEND 4", tempo: 9.827 }, { nome: "LEGEND 5", tempo: 8.818 }, { nome: "LIVELY", tempo: 5.273 },
  { nome: "MIRAI 7", tempo: 7.068 }, { nome: "MIRAI 8", tempo: 6.646 }, { nome: "NEO AURA", tempo: 8.229 }, { nome: "NEO AURA 2", tempo: 8.229 }, { nome: "NEO AURA KINT", tempo: 11.690 }, { nome: "NEO PRYSMA", tempo: 6.690 },
  { nome: "NEO VORTEX", tempo: 8.324 }, { nome: "ORACLE", tempo: 11.477 }, { nome: "REGENT AS", tempo: 4.754 }, { nome: "REGENT AS JUNIOR", tempo: 4.778 }, { nome: "REGENT IN", tempo: 4.755 }, { nome: "REGENT IN JR", tempo: 4.753 },
  { nome: "REGENT MD", tempo: 7.756 }, { nome: "SKYWAY", tempo: 6.687 }, { nome: "STRATOS 3", tempo: 6.486 }, { nome: "SUNRISE", tempo: 10.966 }, { nome: "VICTORY", tempo: 12.015 }, { nome: "VIRTUE", tempo: 5.935 },
  { nome: "VIRTUE 2", tempo: 6.416 }, { nome: "VITALITY 5", tempo: 6.634 }, { nome: "VITALITY 6", tempo: 6.700 }, { nome: "VITALITY 7", tempo: 6.809 }, { nome: "WAY 4", tempo: 7.346 }, { nome: "WAY 5", tempo: 5.933 },
  { nome: "ZEST 2", tempo: 7.649 }
];

const CAPACIDADE_LINHA = 365.2;
const CARGA_PESSOA = 380;

function notify(msg, type = 'info') {
    const old = document.querySelector('.toast');
    if (old) old.remove();
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 100);
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 500);
    }, 2500);
}

// ================= CONTROLE DE MODAIS =================
function abrirModal(id) {
    if (id === 'modalCriar' && document.querySelectorAll(".container-tabela").length >= MAX_TABELAS) {
        notify("LIMITE DE 5 LINHAS!", "error");
        return;
    }
    document.getElementById(id).style.display = "flex";
    if(id === 'modalCriar') document.getElementById("inputNomeTabela").focus();
}

function abrirModalRemover() {
    if (document.querySelectorAll(".container-tabela").length === 0) {
        notify("SEM LINHAS! 👻", "error");
        return;
    }
    abrirModal('modalRemover');
}

function fecharModal(id) {
    document.getElementById(id).style.display = "none";
    if(id === 'modalCriar') document.getElementById("inputNomeTabela").value = "";
}

function confirmarCriacao() {
    const nome = document.getElementById("inputNomeTabela").value || "Linha de Produção";
    criarTabela({ titulo: nome });
    fecharModal('modalCriar');
}

function confirmarRemocao() {
    const tabelas = document.querySelectorAll(".container-tabela");
    tabelas[tabelas.length - 1].remove();
    salvarDados(true);
    atualizarResumoGeral();
    fecharModal('modalRemover');
    notify("APAGADO! 🧐", "error");
}

// ================= FUNÇÕES DE TABELA =================
function criarSelectModelos(valor = "") {
    let html = `<select class="modelo"><option value="">-</option>`;
    MODELOS_DB.forEach(m => {
        html += `<option value="${m.tempo}" ${valor == m.tempo ? "selected" : ""}>${m.nome}</option>`;
    });
    return html + `</select>`;
}

function criarLinhaModelo(dados = {}) {
    return `<tr>
        <td>${criarSelectModelos(dados.modelo)}</td>
        <td><input type="number" oninput="if (this.value.length > 4) this.value = this.value.slice(0, 4);" placeholder="0" class="pares" value="${dados.pares || ""}"></td>
        <td rowspan="3" class="resumo necessidade">-</td>
        <td rowspan="3" class="resumo"><input type="number" oninput="if (this.value.length > 2) this.value = this.value.slice(0, 2);" placeholder="0" class="ativos" value="${dados.ativos || ""}" placeholder="0"></td>
        <td rowspan="3" class="resumo eficiencia">-</td>
    </tr>`;
}

function criarLinhaSimples(dados = {}) {
    return `<tr>
        <td>${criarSelectModelos(dados.modelo)}</td>
        <td><input type="number" class="pares" oninput="if (this.value.length > 4) this.value = this.value.slice(0, 4);" placeholder="0" value="${dados.pares || ""}"></td>
    </tr>`;
}

function criarTabela(dadosTabela = null) {
    const div = document.createElement("div");
    div.className = "container-tabela";
    const titulo = dadosTabela?.titulo || "Linha de Produção";

    div.innerHTML = `
    <div class="titulo-linha">${titulo}</div>
    <table data-tempo="0" data-ativos="0" data-pares="0">
        <thead>
            <tr>
                <th style="width:35%">MODELO</th><th style="width:20%">PARES</th>
                <th style="width:15%">N</th><th style="width:15%">A</th><th style="width:15%">E</th>
            </tr>
        </thead>
        <tbody>
            ${criarLinhaModelo(dadosTabela?.linhas?.[0] || {})}
            ${criarLinhaSimples(dadosTabela?.linhas?.[1] || {})}
            ${criarLinhaSimples(dadosTabela?.linhas?.[2] || {})}
        </tbody>
    </table>
    <div class="total-linha">TOTAL PARES: 0</div>`; // Div de total adicionada aqui

    document.getElementById("tabelas").appendChild(div);
    ativarEventos(div);
    calcularTabela(div);
    atualizarResumoGeral();
    if (dadosTabela?.titulo && !dadosTabela.linhas) notify("LINHA ATIVADA 😉", "success");
}

function ativarEventos(container) {
    container.querySelectorAll("select, input").forEach(el => {
        el.addEventListener("input", () => {
            calcularTabela(container);
            atualizarResumoGeral();
        });
    });
}

function calcularTabela(container) {
    const tabela = container.querySelector("table");
    let tempoTotal = 0, totalPares = 0;
    const modelos = tabela.querySelectorAll(".modelo");
    const pares = tabela.querySelectorAll(".pares");

    modelos.forEach((m, i) => {
        const tempo = parseFloat(m.value);
        const qtd = parseFloat(pares[i].value);
        if (qtd) totalPares += qtd;
        if (tempo && qtd) tempoTotal += tempo * qtd;
    });

    // Atualiza o rodapé da linha com o total de pares
    const totalDiv = container.querySelector(".total-linha");
    if(totalDiv) {
        totalDiv.innerText = "TOTAL PARES: " + totalPares;
    }

    const ativos = parseFloat(tabela.querySelector(".ativos").value);
    tabela.dataset.pares = totalPares;
    tabela.dataset.tempo = tempoTotal;
    tabela.dataset.ativos = ativos || 0;

    tabela.querySelector(".necessidade").innerText = tempoTotal ? Math.round(tempoTotal / CAPACIDADE_LINHA) : "-";
    tabela.querySelector(".eficiencia").innerText = ativos ? Math.round((tempoTotal / (ativos * CARGA_PESSOA)) * 100) + "%" : "-";
}

function salvarDados(silencioso = false) {
    const dados = [];
    document.querySelectorAll(".container-tabela").forEach(container => {
        const titulo = container.querySelector(".titulo-linha").innerText;
        const tabela = container.querySelector("table");
        const linhas = [];
        const modelos = tabela.querySelectorAll(".modelo");
        const pares = tabela.querySelectorAll(".pares");
        const ativos = tabela.querySelector(".ativos").value;

        modelos.forEach((m, i) => {
            linhas.push({
                modelo: m.value,
                pares: pares[i].value,
                ativos: i === 0 ? ativos : ""
            });
        });
        dados.push({ titulo, linhas });
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(dados));
    if (!silencioso) notify("TUDO OK! 😎", "info");
}

function carregarDados() {
    const dados = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    dados.forEach(d => criarTabela(d));
}

function atualizarResumoGeral() {
    let pares = 0, ativos = 0, tempo = 0;
    document.querySelectorAll("table[data-tempo]").forEach(t => {
        pares += +t.dataset.pares || 0;
        ativos += +t.dataset.ativos || 0;
        tempo += +t.dataset.tempo || 0;
    });

    if (!pares && !ativos) { document.getElementById("resumoGeral").innerHTML = ""; return; }

    document.getElementById("resumoGeral").innerHTML = `
    <table class="resumogeral">
        <thead>
            <tr><th colspan="3">RESUMO DA FÁBRICA</th></tr>
            <tr><th>ATIVOS</th><th>POTENCIAL</th><th>EFIC. (%)</th></tr>
        </thead>
        <tbody>
            <tr class="resumo">
                <td>${ativos}</td><td>${pares}</td>
                <td>${ativos ? Math.round((tempo / (ativos * CARGA_PESSOA)) * 100) + "%" : "-"}</td>
            </tr>
        </tbody>
    </table>`;
}

carregarDados();

function goTo(page) {
    setTimeout(() => {
        window.location.href = page;
    }, 200);
}

</script>

</body>
</html>
