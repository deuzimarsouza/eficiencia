<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Mamão com Açúcar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #FFA74D;
            --light-orange: #FFF4E0;
            --card-bg: #FAF0D7;
            --gray-bg: #F5F7F9;
            --text-dark: #000000;
            --text-gray: #666;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #fff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 400px; /* Simulação de tela mobile */
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
        }

        .logo-box {
            width: 55px;
            height: 55px;
            border: 2px solid var(--primary-orange);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-box img {
            width: 30px;
        }

        .menu-btn {
            width: 55px;
            height: 55px;
            border: 1px solid #E2E8F0;
            border-radius: 15px;
            background: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .menu-btn span {
            width: 25px;
            height: 2px;
            background-color: #64748B;
            border-radius: 2px;
        }

        /* Title Styles */
        .main-title {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.1;
            color: var(--text-dark);
            letter-spacing: -1px;
        }

        .main-title span {
            color: var(--primary-orange);
        }

        /* Tabs Styles */
        .tabs-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
            background-color: var(--gray-bg);
            color: var(--text-dark);
        }

        .tab.active {
            background-color: var(--primary-orange);
            color: var(--white);
        }

        /* Card Styles */
        .card {
            background-color: var(--card-bg);
            border-radius: 25px;
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card h2 {
            font-size: 24px;
            font-weight: 700;
        }

        .card p {
            font-size: 13px;
            color: var(--text-gray);
            line-height: 1.4;
            max-width: 90%;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            align-items: baseline;
        }

        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-gray);
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 800;
        }

        /* Responsividade extra */
        @media (max-width: 350px) {
            .main-title { font-size: 28px; }
            .stats-row { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo-box">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C10 2 8 4 8 7C8 8.5 9 10 10 11C8 12 6 14.5 6 17C6 20 8.5 22 12 22C15.5 22 18 20 18 17C18 14.5 16 12 14 11C15 10 16 8.5 16 7C16 4 14 2 12 2Z" stroke="#FFA74D" stroke-width="2"/>
                    <circle cx="12" cy="16" r="1" fill="#FFA74D"/>
                    <circle cx="10" cy="18" r="0.5" fill="#FFA74D"/>
                    <circle cx="14" cy="18" r="0.5" fill="#FFA74D"/>
                </svg>
            </div>
            <button class="menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </header>

        <h1 class="main-title">assistente <span>mamão</span> com açúcar.</h1>

        <nav class="tabs-container">
            <button class="tab active" onclick="switchTab(this)">Produção</button>
            <button class="tab" onclick="switchTab(this)">Mão de Obra</button>
            <button class="tab" onclick="switchTab(this)">Área Técnica</button>
        </nav>

        <main class="card">
            <h2>Projeção Fabrica</h2>
            <p>Determine a capacidade de produção das linhas com o tempo do modelo abastecido diariamente.</p>
            
            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-label">Projetado</span>
                    <span class="stat-value">4.324</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Eficiência</span>
                    <span class="stat-value">85%</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        function switchTab(element) {
            // Remove a classe active de todos os botões
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            // Adiciona ao botão clicado
            element.classList.add('active');
        }
    </script>
</body>
</html>
