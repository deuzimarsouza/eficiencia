<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Leitor de Produção</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    user-select: none;
    scrollbar-width: none;
}

        @font-face{
            font-family: "BricolageBold";
            src: url("fonts/BricolageGrotesque-Bold.otf");
        }

        @font-face{
            font-family: "BricolageMedium";
            src: url("fonts/BricolageGrotesque-Medium.otf");
        }

        @font-face{
            font-family: "BricolageRegular";
            src: url("fonts/BricolageGrotesque-Regular.otf");
        }

        @font-face{
            font-family: "BricolageLight";
            src: url("fonts/BricolageGrotesque-Light.otf");
        }


body {
    background-color: #ffffff;
    padding: 16px;
    font-family: "BricolageRegular";
}

h2 {
    text-align: center;
    padding: 24px 0px;
}

/* CONTROLES */
.controls {
    display: flex;
    flex-direction: row;
    padding: 10px 0px;
}

input, select {
    padding: 12px 14px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 14px;
}

input {
    width: 70%;
    border: 2px solid #c9d5ff;
    margin: 0px 10px 0px 0px;
}
   
select {
    cursor: pointer;
    background: #4f46e5;
    color: white;
    width: 30%;
}

/* TABELA */
.table-container {
    background: white;
    border-radius: 16px;
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
    color: #000000;
}

thead {
    background: #4f46e5;
    color: white;
}

th, td {
    padding: 14px 18px;
}

.tempo-td {
    text-align: right;
}

tbody tr:nth-child(even) {
    background: #f3f4f6;
}

tbody tr:hover {
    background: #e0e7ff;
    transition: 0.2s;
}

td:last-child {
    font-weight: bold;
    color: #4f46e5;
}
</style>
</head>
<body>

<h2>TEMPO DOS MODELOS FREQUÊNCIA</h2>

<div class="controls">
    <input type="text" id="buscarModelo" placeholder="Buscar por modelo...">
    
    <select id="ordenarTempo">
        <option value="normal">Alfabetico</option>
        <option value="maior">Maior tempo</option>
        <option value="menor">Menor tempo</option>
    </select>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th class="artigo">Artigo</th>
                <th class="modelo">Modelo</th>
                <th class="tempo-th">Tempo</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script>

let dados = [];

async function buscarDados() {
    try {
        const resposta = await fetch('dados.txt');
        const texto = await resposta.text();

        const linhas = texto.split('\n').filter(l => l.trim() !== '');
        linhas.shift(); // remove cabeçalho

        dados = linhas.map(linha => {
            const partes = linha.split(/\t+/);

            return {
                artigo: partes[0].trim(),
                modelo: partes[1].trim(),
                tempoTexto: partes[2].trim(),
                tempoNumero: parseFloat(partes[2].replace(',', '.'))
            };
        });

        renderizarTabela(dados);

    } catch (erro) {
        console.error("Erro ao carregar:", erro);
    }
}

function renderizarTabela(lista) {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    lista.forEach(item => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
            <td>${item.artigo}</td>
            <td>${item.modelo}</td>
            <td class="tempo-td">${item.tempoTexto}</td>
        `;

        tbody.appendChild(tr);
    });
}

/* FILTRO E ORDENAÇÃO */
function aplicarFiltros() {
    const busca = document.getElementById('buscarModelo').value.toLowerCase();
    const ordenacao = document.getElementById('ordenarTempo').value;

    let filtrado = dados.filter(item =>
        item.modelo.toLowerCase().includes(busca)
    );

    if (ordenacao === 'maior') {
        filtrado.sort((a, b) => b.tempoNumero - a.tempoNumero);
    }

    if (ordenacao === 'menor') {
        filtrado.sort((a, b) => a.tempoNumero - b.tempoNumero);
    }

    renderizarTabela(filtrado);
}

/* EVENTOS */
document.getElementById('buscarModelo').addEventListener('input', aplicarFiltros);
document.getElementById('ordenarTempo').addEventListener('change', aplicarFiltros);

buscarDados();

</script>

</body>
</html>
