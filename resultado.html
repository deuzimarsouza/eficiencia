<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Produção Pro | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            background: var(--card-bg);
            padding: 12px;
            border-radius: 16px;
        }

        header {
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }

        h2 {
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
        }

        /* Tabela Responsiva */
        .table-wrapper {
            width: 100%;
            margin-bottom: 24px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #0000ff;
            text-align: center;
            width: 20%;
            height: 48px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #fff;
        }

        td {
            border-bottom: 1px solid var(--border);
            width: 20%;
            height: 48px;
            text-align: center;
        }

        input {
            width: 100%;
            height: 100%;
            border: 1px solid transparent;
            border-radius: 6px;
            background: transparent;
            font-size: 0.9rem;
            transition: all 0.2s;
            text-align: center;
        }

        input:hover { background: #f1f5f9; }
        input:focus {
            outline: none;
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        /* Cores Dinâmicas */
        .trend-up { color: var(--success); font-weight: 700; }
        .trend-down { color: var(--danger); font-weight: 700; }
        
        .efic-badge {
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .total-row { 
            font-weight: 700; 
            background: #f8fafc; 
        }

        /* Controles (Botões) */
        .controls {
            display: flex;
            flex-wrap: wrap; /* Permite quebrar linha no celular */
            justify-content: flex-end;
            gap: 12px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        button {
            flex: 1; /* Botões crescem em telas pequenas */
            min-width: 150px;
            max-width: 250px;
            padding: 12px 20px;
            cursor: pointer;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: white;
        }

        .btn-add { background: var(--primary); color: white; border: none; }
        .btn-save { background: var(--success); color: white; border: none; }
        
        button:active { transform: scale(0.98); }

        /* Ajustes para celular */
        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            button {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Monitoramento de Produção</h2>
    </header>

    <div class="table-wrapper">
        <table id="prodTable">
            <thead>
                <tr>
                    <th>LINHA</th>
                    <th style="text-align: center;">PROJ.</th>
                    <th style="text-align: center;">REAL</th>
                    <th style="text-align: center;">DIF.</th>
                    <th style="text-align: center;">%</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
            <tfoot>
                <tr class="total-row">
                    <td>TOTAL</td>
                    <td id="totalProj" style="text-align: center;">0</td>
                    <td id="totalReal" style="text-align: center;">0</td>
                    <td id="totalDif" style="text-align: center;">0</td>
                    <td id="totalEfic" style="text-align: center;">0%</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <div class="controls">
        <button onclick="removeLastRow()" style="color: var(--danger);">
            ✖ Remover Última
        </button>
        <button class="btn-add" onclick="addRow()">
            ➕ Adicionar Linha
        </button>
        <button class="btn-save" id="saveBtn" onclick="saveData()">
            💾 Salvar Relatório
        </button>
    </div>
</div>

<script>
    window.onload = loadData;

    function addRow(label = null, proj = 0, real = 0) {
        const tbody = document.getElementById('tableBody');
        const rowCount = tbody.rows.length + 1;
        const tr = document.createElement('tr');
        const finalLabel = label || 'Linha ' + (rowCount < 10 ? '0' + rowCount : rowCount);

        tr.innerHTML = `
            <td><input type="text" value="${finalLabel}"></td>
            <td><input type="number" value="${proj}" oninput="calculate()" style="text-align: center;"></td>
            <td><input type="number" value="${real}" oninput="calculate()" style="text-align: center;"></td>
            <td style="text-align: center;" class="diff-cell">0</td>
            <td style="text-align: center;"><span class="efic-badge efic-cell">0%</span></td>
        `;
        tbody.appendChild(tr);
        calculate();
    }

    function removeLastRow() {
        const tbody = document.getElementById('tableBody');
        if (tbody.rows.length > 0) {
            tbody.deleteRow(-1);
            calculate();
        }
    }

    function calculate() {
        const rows = document.querySelectorAll('#tableBody tr');
        let tProj = 0, tReal = 0;

        rows.forEach(row => {
            const proj = parseFloat(row.cells[1].querySelector('input').value) || 0;
            const real = parseFloat(row.cells[2].querySelector('input').value) || 0;
            const diff = real - proj;
            const efic = proj > 0 ? Math.round((real / proj) * 100) : 0;

            // Diferença por linha
            row.cells[3].innerHTML = diff > 0 ? `<span class="trend-up">+${diff}</span>` : 
                                    (diff < 0 ? `<span class="trend-down">${diff}</span>` : `0`);
            row.querySelector('.efic-cell').innerText = efic + "%";

            tProj += proj; tReal += real;
        });

        // Totais
        document.getElementById('totalProj').innerText = tProj;
        document.getElementById('totalReal').innerText = tReal;
        
        const totalDif = tReal - tProj;
        const totalDifElem = document.getElementById('totalDif');
        
        // LÓGICA DE CORES DO TOTAL GERAL
        if (totalDif > 0) {
            totalDifElem.innerHTML = `<span class="trend-up">+${totalDif}</span>`;
        } else if (totalDif < 0) {
            totalDifElem.innerHTML = `<span class="trend-down">${totalDif}</span>`;
        } else {
            totalDifElem.innerHTML = `<span>0</span>`;
        }

        const totalEfic = tProj > 0 ? Math.round((tReal / tProj) * 100) : 0;
        document.getElementById('totalEfic').innerText = totalEfic + "%";
    }

    function saveData() {
        const rows = document.querySelectorAll('#tableBody tr');
        const data = Array.from(rows).map(row => ({
            label: row.cells[0].querySelector('input').value,
            proj: row.cells[1].querySelector('input').value,
            real: row.cells[2].querySelector('input').value
        }));
        localStorage.setItem('producaoDados', JSON.stringify(data));
        
        const btn = document.getElementById('saveBtn');
        const original = btn.innerHTML;
        btn.innerHTML = "✅ Dados Salvos!";
        btn.style.background = "#059669";
        setTimeout(() => {
            btn.innerHTML = original;
            btn.style.background = "var(--success)";
        }, 2000);
    }

    function loadData() {
        const saved = localStorage.getItem('producaoDados');
        if (saved) JSON.parse(saved).forEach(item => addRow(item.label, item.proj, item.real));
        else addRow();
    }
</script>

</body>
</html>
